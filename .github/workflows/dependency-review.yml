name: Dependency Review

# This workflow runs security audits on dependencies
# Note: The dependency-review-action job is commented out because it requires
# GitHub Advanced Security which is not available for private repositories
# without a GitHub Enterprise license or additional payment.
# 
# The workflow still runs:
# - Bun security audit (checking for outdated packages and vulnerabilities)
# - License compliance checks
# - SBOM generation

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lock'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
      - 'Dockerfile*'
      - 'docker-compose*.yml'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # Note: dependency-review-action requires GitHub Advanced Security for private repos
  # Commenting out for now - uncomment if Advanced Security is enabled
  # dependency-review:
